name: Build Enterprise App

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/build-app.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            477261461487.dkr.ecr.us-east-1.amazonaws.com/enterprise-devops-dev-app:${{ github.sha }}
            477261461487.dkr.ecr.us-east-1.amazonaws.com/enterprise-devops-dev-app:latest

      - name: Verify image pushed
        run: echo "Enterprise app image pushed to Amazon ECR successfully"